upstream nextjs_upstream {
    server app:3000;
}

# HTTP — serves the ACME challenge and redirects everything else to HTTPS.
server {
    listen 80;
    server_name almanyar.com www.almanyar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name almanyar.com www.almanyar.com;

    ssl_certificate     /etc/letsencrypt/live/almanyar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/almanyar.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10M;
    }
}
