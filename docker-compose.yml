services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: germanbiz
      POSTGRES_USER: germanbiz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    # Bind to localhost only — the DB is reached by the app over the internal
    # Docker network and must never be exposed to the public internet.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U germanbiz"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://germanbiz:${POSTGRES_PASSWORD:-changeme}@postgres:5432/germanbiz?schema=public
      # Gates SEO-sensitive behavior (robots.txt indexability, optional
      # analytics). Must be exactly "production" on the live site or the
      # robots.txt fail-safe will return Disallow: / for everything.
      # Server-side only (not NEXT_PUBLIC_*) so it's a true runtime env,
      # not inlined into the build bundle by webpack.
      APP_ENV: ${APP_ENV:-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL}
      STORAGE_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    # Bind to localhost — nginx proxies public traffic; the app port is not exposed directly.
    ports:
      - "127.0.0.1:3000:3000"
    # Pin the Prisma CLI version: a bare `npx prisma` pulls the latest major (7.x),
    # which rejects this schema's `url = env(...)`. Must match @prisma/client (5.x).
    command: sh -c "npx --yes prisma@5.22.0 migrate deploy && node server.js"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
      - ./docker/certbot/www:/var/www/certbot:ro

volumes:
  uploads:
