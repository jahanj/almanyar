<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder owner portrait. Replace before public marketing — see
  src/lib/owner.ts (OWNER_PHOTO_URL) and PHASE-3-REPORT.md TODOs.
  Renders square 800x800; the same constant points the page + the
  Person JSON-LD's image at the file, so a single URL change swaps it.
-->
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="پلیس‌هولدر چهره‌ی محمد جهانبانی">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ecfdf5"/>
      <stop offset="60%"  stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="silhouette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#065f46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <radialGradient id="shine" cx="40%" cy="32%" r="35%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- soft halo behind the silhouette -->
  <circle cx="400" cy="430" r="290" fill="#ffffff" fill-opacity="0.45"/>

  <!-- silhouette: head + shoulders. -->
  <g fill="url(#silhouette)">
    <!-- shoulders / torso -->
    <path d="M120,800 C120,610 220,520 400,520 C580,520 680,610 680,800 Z"/>
    <!-- neck -->
    <rect x="358" y="430" width="84" height="80" rx="20"/>
    <!-- head -->
    <ellipse cx="400" cy="330" rx="140" ry="160"/>
  </g>

  <!-- subtle gloss -->
  <ellipse cx="400" cy="330" rx="140" ry="160" fill="url(#shine)"/>

  <!-- corner watermark for clarity that this is a placeholder -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#065f46" fill-opacity="0.45" text-anchor="end">
    <text x="770" y="770">placeholder</text>
  </g>
</svg>
